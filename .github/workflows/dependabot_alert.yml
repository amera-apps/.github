# .github/workflows/dependabot_alert.yml
#
# Phase 1 of the Dependabot lifecycle: alert created.
# Posts a Slack message and creates a Linear ticket, both keyed by GHSA ID
# so downstream workflows can find and update them.
#
# Inputs fall back to org-level variables when not provided by the caller.

name: Dependabot Alert
on:
  workflow_call:
    inputs:
      slack-channel-id:
        required: false
        type: string
      linear-team-id:
        required: false
        type: string
      linear-project-id:
        required: false
        type: string
    secrets:
      slack-bot-token:
        required: false
      linear-api-key:
        required: false

permissions:
  security-events: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Extract alert details
        id: alert
        uses: actions/github-script@v7
        with:
          script: |
            const alert = context.payload.alert
            const severity = alert.security_vulnerability.severity
            const pkg = alert.dependency.package.name
            const ecosystem = alert.dependency.package.ecosystem
            const summary = alert.security_advisory.summary
            const url = alert.html_url
            const cve = alert.security_advisory.cve_id || 'N/A'
            const ghsa = alert.security_advisory.ghsa_id
            const repo = context.payload.repository.full_name

            core.setOutput('severity', severity)
            core.setOutput('package', pkg)
            core.setOutput('ecosystem', ecosystem)
            core.setOutput('summary', summary)
            core.setOutput('url', url)
            core.setOutput('cve', cve)
            core.setOutput('ghsa', ghsa)
            core.setOutput('repo', repo)

      - name: Post to Slack
        if: inputs.slack-channel-id != '' || vars.SLACK_PROJ_COMPLIANCE_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.slack-bot-token }}
          arguments: |
            channel: ${{ inputs.slack-channel-id || vars.SLACK_PROJ_COMPLIANCE_CHANNEL_ID }}
            text: "🔒 *Dependabot alert* in `${{ steps.alert.outputs.repo }}`\n*Severity:* ${{ steps.alert.outputs.severity }}\n*Package:* `${{ steps.alert.outputs.package }}` (${{ steps.alert.outputs.ecosystem }})\n*CVE:* ${{ steps.alert.outputs.cve }}\n*GHSA:* ${{ steps.alert.outputs.ghsa }}\n*Summary:* ${{ steps.alert.outputs.summary }}\n${{ steps.alert.outputs.url }}"

      - name: Create Linear ticket
        if: inputs.linear-team-id != '' || vars.LINEAR_AMERA_TEAM_ID != ''
        run: |
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "$(jq -n \
              --arg title "[$SEVERITY] $GHSA: Vulnerability in $PACKAGE" \
              --arg desc "A **$SEVERITY** severity vulnerability was detected in \`$PACKAGE\` ($ECOSYSTEM).\n\n**GHSA:** $GHSA\n**CVE:** $CVE\n**Summary:** $SUMMARY\n**Repo:** $REPO\n**Alert:** $ALERT_URL\n\nIf Dependabot opens a fix PR it will be triaged automatically. If no PR appears, manual intervention is required." \
              --arg team "$LINEAR_TEAM_ID" \
              --arg project "$LINEAR_PROJECT_ID" \
              '{ query: "mutation($input: IssueCreateInput!) { issueCreate(input: $input) { success issue { url } } }", variables: { input: { title: $title, description: $desc, teamId: $team, projectId: $project } } }'
            )"
        env:
          LINEAR_API_KEY: ${{ secrets.linear-api-key }}
          LINEAR_TEAM_ID: ${{ inputs.linear-team-id || vars.LINEAR_AMERA_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ inputs.linear-project-id || vars.LINEAR_SOC2_COMPLIANCE_PROJECT_ID }}
          SEVERITY: ${{ steps.alert.outputs.severity }}
          PACKAGE: ${{ steps.alert.outputs.package }}
          ECOSYSTEM: ${{ steps.alert.outputs.ecosystem }}
          CVE: ${{ steps.alert.outputs.cve }}
          GHSA: ${{ steps.alert.outputs.ghsa }}
          SUMMARY: ${{ steps.alert.outputs.summary }}
          REPO: ${{ steps.alert.outputs.repo }}
          ALERT_URL: ${{ steps.alert.outputs.url }}
