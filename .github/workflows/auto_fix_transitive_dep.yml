# .github/workflows/auto_fix_transitive_dep.yml
#
# Automatically fixes transitive dependency vulnerabilities by updating
# the lockfile and opening a PR in the affected repo. Triggered by the
# amera-dependabot Lambda when it classifies an alert as fixable_manual.
#
# Flow: Lambda dispatches → this workflow checks out the target repo →
# updates the vulnerable package(s) → opens a PR with the lockfile diff.
# If a PR for the same GHSA already exists, create-pull-request will
# force-push to the existing branch and update the PR rather than
# creating a duplicate.

name: Auto-fix transitive dependency

on:
  workflow_dispatch:
    inputs:
      target_repo:
        required: true
        type: string
        description: 'Repo name (short, not full_name) to fix'
      packages:
        required: true
        type: string
        description: 'Space-separated package names to update'
      ecosystem:
        required: true
        type: string
        description: 'Package ecosystem (pip, npm)'
      ghsa_ids:
        required: true
        type: string
        description: 'GHSA ID(s) for the branch name and PR metadata'
      severity:
        required: true
        type: string
        description: 'Alert severity (critical, high, medium, low)'
      linear_ticket:
        required: false
        type: string
        description: 'Linear ticket identifier (e.g. AMR-123)'
      alert_url:
        required: false
        type: string
        description: 'GitHub Dependabot alert URL'
      slack_thread_ts:
        required: false
        type: string
        description: 'Slack thread timestamp for posting failure updates in-thread'
      slack_channel_id:
        required: false
        type: string
        description: 'Slack channel ID where the GHSA thread lives'

# Minimal permissions — the app token provides write access to the target repo.
# packages: read allows GITHUB_TOKEN to pull @amera-apps npm packages from
# GitHub Packages (each package grants .github repo read via "Manage Actions access").
permissions:
  contents: read
  packages: read

# Prevent duplicate runs for the same repo + advisory. cancel-in-progress
# is false so a queued run still executes (the alert may have changed).
concurrency:
  group: auto-fix-${{ inputs.target_repo }}-${{ inputs.ghsa_ids }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Python (Poetry) job
  # ═══════════════════════════════════════════════════════════════════════
  fix-python:
    if: inputs.ecosystem == 'pip'
    runs-on: ubuntu-latest
    steps:
      # Scoped app token — only grants access to the specific target repo,
      # not the entire org. Used for checkout, PR creation, and gh CLI calls.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AMERABOT_APP_ID }}
          private-key: ${{ secrets.AMERABOT_APP_PRIVATE_KEY }}
          owner: amera-apps
          repositories: ${{ inputs.target_repo }}

      # Checks out the target repo's default branch — not this (.github) repo.
      # The app token is required for push access when create-pull-request
      # commits changes later.
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          repository: amera-apps/${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}

      # Reads Python and Poetry version requirements from the target repo's
      # pyproject.toml BEFORE setting up the toolchain. Uses the runner's
      # system Python (3.12 on ubuntu-24.04) which has tomllib built in.
      # Outputs:
      #   python-version  — major.minor extracted from requires-python or
      #                      tool.poetry.dependencies.python (fallback: 3.11)
      #   poetry-constraint — raw requires-poetry value for pipx install
      - name: Detect project requirements
        id: project-meta
        run: |
          python3 -c "
          import tomllib, pathlib, re, os
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())

          py = (
              data.get('project', {}).get('requires-python', '')
              or data.get('tool', {}).get('poetry', {}).get('dependencies', {}).get('python', '')
          )
          match = re.search(r'(\d+\.\d+)', py)
          py_version = match.group(1) if match else '3.11'

          poetry = data.get('tool', {}).get('poetry', {}).get('requires-poetry', '')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'python-version={py_version}\n')
              f.write(f'poetry-constraint={poetry}\n')
          "

      # Installs the exact Python version the target repo requires.
      # Without this, Poetry will refuse to resolve dependencies if the
      # running Python falls outside the project's requires-python range.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.project-meta.outputs.python-version }}

      # Installs the Poetry version the target repo expects. The constraint
      # may be a bare version ("2.2.1") or a PEP 440 range (">=2.2,<2.3").
      # Bare versions get a == prefix so pipx resolves them correctly
      # (e.g. "poetry==2.2.1" instead of the malformed "poetry2.2.1").
      - name: Install Poetry
        run: |
          CONSTRAINT="${{ steps.project-meta.outputs.poetry-constraint }}"
          if [ -n "$CONSTRAINT" ]; then
            if [[ "$CONSTRAINT" =~ ^[0-9] ]]; then
              CONSTRAINT="==${CONSTRAINT}"
            fi
            pipx install "poetry${CONSTRAINT}"
          else
            pipx install poetry
          fi

      # AWS credentials are needed to fetch a CodeArtifact auth token for
      # our private PyPI registry. These are org-level secrets shared by
      # all workflow runs.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Short-lived token for our private PyPI registry on CodeArtifact.
      # Masked in logs to prevent accidental exposure.
      - name: Get CodeArtifact token
        id: ca
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="$(aws codeartifact get-authorization-token \
            --domain amera-artifacts \
            --domain-owner ${{ vars.AWS_OWNER_ID }} \
            --region "${{ vars.AWS_REGION }}" \
            --query authorizationToken --output text)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # Only adds the CodeArtifact source if it's not already configured in
      # the repo's pyproject.toml. This avoids overwriting the repo's chosen
      # priority (e.g. "explicit") with our default "supplemental", which
      # would cause an unintended pyproject.toml diff in the PR.
      - name: Authenticate Poetry
        run: |
          if ! poetry source show codeartifact &>/dev/null; then
            poetry source add --priority=supplemental codeartifact \
              https://amera-artifacts-371568547021.d.codeartifact.us-east-1.amazonaws.com/pypi/amera-python/simple/
          fi
          poetry config http-basic.codeartifact aws "${{ steps.ca.outputs.token }}"

      # Sync the lockfile with pyproject.toml without upgrading packages.
      # Target repos may have pyproject.toml changes that haven't been locked yet.
      # In Poetry 2.x, `poetry lock` preserves existing pinned versions by default,
      # so only the targeted `poetry update $PACKAGES` step changes dependency versions.
      - name: Sync lockfile
        run: poetry lock --no-interaction

      # Full install so the virtualenv is consistent before we do a targeted
      # update. Required for `poetry show` to report accurate current versions.
      - name: Install dependencies
        run: poetry install --no-interaction

      # Core step: snapshots current versions, runs the targeted update, then
      # checks if the lockfile actually changed. If it did, builds a markdown
      # version table (Before → After) for the PR description.
      # Outputs:
      #   changed       — "true" if poetry.lock was modified
      #   version_table — markdown table of package version changes
      - name: Update vulnerable packages
        id: update
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          declare -A BEFORE_VERS
          for pkg in $PACKAGES; do
            ver=$(poetry show "$pkg" 2>/dev/null | awk '/version/{print $NF; exit}') || ver="not-installed"
            BEFORE_VERS["$pkg"]="$ver"
          done

          echo "::group::poetry update output"
          poetry update $PACKAGES --no-interaction 2>&1 | tee /tmp/update_output.txt
          echo "::endgroup::"

          if git diff --quiet poetry.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No lockfile changes — package may already be up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            CHANGES=""
            SUMMARY_PARTS=""
            for pkg in "${!BEFORE_VERS[@]}"; do
              old_ver="${BEFORE_VERS[$pkg]}"
              new_ver=$(poetry show "$pkg" 2>/dev/null | awk '/version/{print $NF; exit}') || new_ver="unknown"
              CHANGES="$CHANGES| \`$pkg\` | $old_ver | $new_ver |"$'\n'
              if [ -n "$SUMMARY_PARTS" ]; then SUMMARY_PARTS="$SUMMARY_PARTS, "; fi
              SUMMARY_PARTS="$SUMMARY_PARTS$pkg [$old_ver → $new_ver]"
            done

            echo "version_summary=$SUMMARY_PARTS" >> "$GITHUB_OUTPUT"
            {
              echo "version_table<<EOF"
              echo "| Package | Before | After |"
              echo "|---------|--------|-------|"
              echo -n "$CHANGES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # Best-effort vulnerability scan after the update. continue-on-error
      # ensures a pip-audit failure (e.g. remaining vulns in other packages)
      # doesn't block the PR — the goal is visibility, not gating.
      - name: Verify fix with pip-audit
        if: steps.update.outputs.changed == 'true'
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --progress-spinner off

      # Opens a PR (or updates the existing one if the fix/$GHSA branch
      # already exists). create-pull-request handles branch creation,
      # committing the lockfile changes, and force-pushing if needed.
      - name: Create PR
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: fix/${{ inputs.ghsa_ids }}
          commit-message: 'fix: update ${{ steps.update.outputs.version_summary }} (${{ inputs.ghsa_ids }})'
          title: 'fix: update ${{ steps.update.outputs.version_summary }} (${{ inputs.ghsa_ids }})'
          body: |
            ## Summary

            Automated fix for a **${{ inputs.severity }}**-severity transitive dependency vulnerability.

            Updates `${{ inputs.packages }}` to resolve [${{ inputs.ghsa_ids }}](https://github.com/advisories/${{ inputs.ghsa_ids }}).

            ### Version changes

            ${{ steps.update.outputs.version_table }}

            **Opened by:** [amera-dependabot](https://github.com/amera-apps/infra/tree/main/aws/lambda/amera-dependabot) via [auto-fix workflow](https://github.com/amera-apps/.github/blob/main/.github/workflows/auto_fix_transitive_dep.yml)
            ${{ inputs.alert_url && format('**Alert:** {0}', inputs.alert_url) || '' }}

            ### What to do

            1. Review the lockfile changes
            2. Confirm CI passes
            3. Merge when ready

            ${{ inputs.linear_ticket && format('Resolves {0}', inputs.linear_ticket) || '' }}
          labels: |
            amerabot
            dependencies
            security

      # Many repos use a staging branch as the merge target instead of main.
      # If staging exists, retarget the PR so it merges there. Fails silently
      # if staging doesn't exist (the PR stays targeted at the default branch).
      - name: Retarget to staging
        if: steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          if gh api "repos/amera-apps/$TARGET_REPO/branches/staging" --silent 2>/dev/null; then
            gh pr edit ${{ steps.create-pr.outputs.pull-request-number }} \
              --repo "amera-apps/$TARGET_REPO" \
              --base staging
            echo "Retargeted PR to staging"
          fi

      # ── Failure / cancellation notifications ──────────────────────────
      # These steps only run when a previous step failed or the run was
      # cancelled. They post updates to the existing Slack thread and
      # Linear ticket — never top-level messages or new tickets.

      - name: Notify Slack (failure)
        if: (failure() || cancelled()) && inputs.slack_thread_ts
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ inputs.slack_channel_id }}
            thread_ts: "${{ inputs.slack_thread_ts }}"
            text: ":x: Auto-fix workflow failed for `${{ inputs.packages }}` in `${{ inputs.target_repo }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
            unfurl_links: false
            unfurl_media: false

      - name: Comment on Linear ticket (failure)
        if: (failure() || cancelled()) && inputs.linear_ticket
        env:
          LINEAR_OAUTH_CLIENT_ID: ${{ secrets.LINEAR_AMERABOT_OAUTH_CLIENT_ID }}
          LINEAR_OAUTH_CLIENT_SECRET: ${{ secrets.LINEAR_AMERABOT_OAUTH_CLIENT_SECRET }}
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://api.linear.app/oauth/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$LINEAR_OAUTH_CLIENT_ID&client_secret=$LINEAR_OAUTH_CLIENT_SECRET&scope=read,write,issues:create")
          LINEAR_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$LINEAR_TOKEN" ]; then
            echo "::warning::Failed to fetch Linear OAuth token"
            echo "Response: $TOKEN_RESPONSE"
            exit 0
          fi
          echo "::add-mask::$LINEAR_TOKEN"

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Looking up Linear issue ${{ inputs.linear_ticket }}..."

          RESPONSE=$(curl -s https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_TOKEN" \
            -d '{"query":"{ issue(id:\"${{ inputs.linear_ticket }}\") { id } }"}')

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issue.id // empty')

          if [ -z "$ISSUE_ID" ]; then
            echo "::warning::Could not resolve Linear issue ID for ${{ inputs.linear_ticket }}"
            echo "API response: $RESPONSE"
            exit 0
          fi

          echo "Resolved to internal ID: $ISSUE_ID — posting comment..."
          COMMENT_RESPONSE=$(curl -s https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_TOKEN" \
            -d "{\"query\":\"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"Auto-fix workflow failed for **${{ inputs.target_repo }}** — [view run]($RUN_URL)\\\" }) { success } }\"}")

          SUCCESS=$(echo "$COMMENT_RESPONSE" | jq -r '.data.commentCreate.success // false')
          if [ "$SUCCESS" = "true" ]; then
            echo "Comment posted successfully"
          else
            echo "::warning::Failed to post comment on ${{ inputs.linear_ticket }}"
            echo "API response: $COMMENT_RESPONSE"
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # npm job — mirrors the Python job structure but uses npm tooling.
  # No private registry or lockfile sync needed; npm update handles
  # everything in one step.
  # ═══════════════════════════════════════════════════════════════════════
  fix-npm:
    if: inputs.ecosystem == 'npm'
    runs-on: ubuntu-latest
    steps:
      # Scoped app token for repo operations (checkout, PR creation).
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AMERABOT_APP_ID }}
          private-key: ${{ secrets.AMERABOT_APP_PRIVATE_KEY }}
          owner: amera-apps
          repositories: ${{ inputs.target_repo }}

      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          repository: amera-apps/${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}

      # Reads the Node version from the target repo. Checks .nvmrc and
      # .node-version first (explicit pinning), then falls back to the
      # engines.node field in package.json. Defaults to 20 (current LTS)
      # if none are found.
      - name: Detect Node version
        id: node-meta
        run: |
          NODE_VERSION="20"
          if [ -f .nvmrc ]; then
            NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')
          elif [ -f .node-version ]; then
            NODE_VERSION=$(cat .node-version | tr -d '[:space:]')
          elif [ -f package.json ]; then
            ENGINES=$(python3 -c "
          import json, re
          pkg = json.load(open('package.json'))
          constraint = pkg.get('engines', {}).get('node', '')
          match = re.search(r'(\d+)', constraint)
          print(match.group(1) if match else '')
          " 2>/dev/null || echo "")
            if [ -n "$ENGINES" ]; then
              NODE_VERSION="$ENGINES"
            fi
          fi
          echo "version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.node-meta.outputs.version }}

      # Authenticate to GitHub Packages for @amera-apps scoped packages.
      # Uses GITHUB_TOKEN — each private @amera-apps npm package grants
      # the .github repo read access via "Manage Actions access" settings.
      - name: Configure npm for private packages
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "@amera-apps:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ github.token }}" >> .npmrc

      # Same snapshot-update-diff pattern as the Python job.
      # Uses `npm list --json` to read versions before/after since npm
      # doesn't have a `poetry show`-style command for single packages.
      - name: Update vulnerable packages
        id: update
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          declare -A BEFORE_VERS
          for pkg in $PACKAGES; do
            ver=$(python3 -c "
          import json
          lock = json.load(open('package-lock.json'))
          print(lock.get('packages', {}).get('node_modules/$pkg', {}).get('version', 'not-installed'))
          " 2>/dev/null) || ver="not-installed"
            BEFORE_VERS["$pkg"]="$ver"
          done

          npm update $PACKAGES

          if git diff --quiet package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No lockfile changes — package may already be up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            CHANGES=""
            SUMMARY_PARTS=""
            for pkg in "${!BEFORE_VERS[@]}"; do
              old_ver="${BEFORE_VERS[$pkg]}"
              new_ver=$(python3 -c "
          import json
          lock = json.load(open('package-lock.json'))
          print(lock.get('packages', {}).get('node_modules/$pkg', {}).get('version', 'unknown'))
          " 2>/dev/null) || new_ver="unknown"
              CHANGES="$CHANGES| \`$pkg\` | $old_ver | $new_ver |"$'\n'
              if [ -n "$SUMMARY_PARTS" ]; then SUMMARY_PARTS="$SUMMARY_PARTS, "; fi
              SUMMARY_PARTS="$SUMMARY_PARTS$pkg [$old_ver → $new_ver]"
            done

            echo "version_summary=$SUMMARY_PARTS" >> "$GITHUB_OUTPUT"
            {
              echo "version_table<<EOF"
              echo "| Package | Before | After |"
              echo "|---------|--------|-------|"
              echo -n "$CHANGES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # Remove the .npmrc we created for private package auth so it
      # doesn't get committed into the PR by create-pull-request.
      - name: Clean up .npmrc
        run: git checkout -- .npmrc 2>/dev/null || rm -f .npmrc

      # Best-effort audit — same rationale as pip-audit above.
      - name: Verify fix with npm audit
        if: steps.update.outputs.changed == 'true'
        continue-on-error: true
        run: npm audit

      - name: Create PR
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: fix/${{ inputs.ghsa_ids }}
          commit-message: 'fix: update ${{ steps.update.outputs.version_summary }} (${{ inputs.ghsa_ids }})'
          title: 'fix: update ${{ steps.update.outputs.version_summary }} (${{ inputs.ghsa_ids }})'
          body: |
            ## Summary

            Automated fix for a **${{ inputs.severity }}**-severity transitive dependency vulnerability.

            Updates `${{ inputs.packages }}` to resolve [${{ inputs.ghsa_ids }}](https://github.com/advisories/${{ inputs.ghsa_ids }}).

            ### Version changes

            ${{ steps.update.outputs.version_table }}

            **Opened by:** [amera-dependabot](https://github.com/amera-apps/infra/tree/main/aws/lambda/amera-dependabot) via [auto-fix workflow](https://github.com/amera-apps/.github/blob/main/.github/workflows/auto_fix_transitive_dep.yml)
            ${{ inputs.alert_url && format('**Alert:** {0}', inputs.alert_url) || '' }}

            ### What to do

            1. Review the lockfile changes
            2. Confirm CI passes
            3. Merge when ready

            ${{ inputs.linear_ticket && format('Resolves {0}', inputs.linear_ticket) || '' }}
          labels: |
            amerabot
            dependencies
            security

      # Same staging retarget logic as the Python job.
      - name: Retarget to staging
        if: steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          if gh api "repos/amera-apps/$TARGET_REPO/branches/staging" --silent 2>/dev/null; then
            gh pr edit ${{ steps.create-pr.outputs.pull-request-number }} \
              --repo "amera-apps/$TARGET_REPO" \
              --base staging
            echo "Retargeted PR to staging"
          fi

      # ── Failure / cancellation notifications ──────────────────────────

      - name: Notify Slack (failure)
        if: (failure() || cancelled()) && inputs.slack_thread_ts
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ inputs.slack_channel_id }}
            thread_ts: "${{ inputs.slack_thread_ts }}"
            text: ":x: Auto-fix workflow failed for `${{ inputs.packages }}` in `${{ inputs.target_repo }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
            unfurl_links: false
            unfurl_media: false

      - name: Comment on Linear ticket (failure)
        if: (failure() || cancelled()) && inputs.linear_ticket
        env:
          LINEAR_OAUTH_CLIENT_ID: ${{ secrets.LINEAR_AMERABOT_OAUTH_CLIENT_ID }}
          LINEAR_OAUTH_CLIENT_SECRET: ${{ secrets.LINEAR_AMERABOT_OAUTH_CLIENT_SECRET }}
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://api.linear.app/oauth/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$LINEAR_OAUTH_CLIENT_ID&client_secret=$LINEAR_OAUTH_CLIENT_SECRET&scope=read,write,issues:create")
          LINEAR_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$LINEAR_TOKEN" ]; then
            echo "::warning::Failed to fetch Linear OAuth token"
            echo "Response: $TOKEN_RESPONSE"
            exit 0
          fi
          echo "::add-mask::$LINEAR_TOKEN"

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Looking up Linear issue ${{ inputs.linear_ticket }}..."

          RESPONSE=$(curl -s https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_TOKEN" \
            -d '{"query":"{ issue(id:\"${{ inputs.linear_ticket }}\") { id } }"}')

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issue.id // empty')

          if [ -z "$ISSUE_ID" ]; then
            echo "::warning::Could not resolve Linear issue ID for ${{ inputs.linear_ticket }}"
            echo "API response: $RESPONSE"
            exit 0
          fi

          echo "Resolved to internal ID: $ISSUE_ID — posting comment..."
          COMMENT_RESPONSE=$(curl -s https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_TOKEN" \
            -d "{\"query\":\"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"Auto-fix workflow failed for **${{ inputs.target_repo }}** — [view run]($RUN_URL)\\\" }) { success } }\"}")

          SUCCESS=$(echo "$COMMENT_RESPONSE" | jq -r '.data.commentCreate.success // false')
          if [ "$SUCCESS" = "true" ]; then
            echo "Comment posted successfully"
          else
            echo "::warning::Failed to post comment on ${{ inputs.linear_ticket }}"
            echo "API response: $COMMENT_RESPONSE"
          fi
