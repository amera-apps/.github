# .github/workflows/sync_dependabot_python.yml
#
# Ensures every org repo with a pyproject.toml in the root has the correct
# .github/dependabot.yml. Opens a PR (rather than pushing directly) to
# comply with branch protection rules requiring review before merge.
#
# Posts a Slack summary and creates a Linear ticket per repo for each PR opened.

name: Sync Dependabot Config (Python)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AMERABOT_APP_ID }}
          private-key: ${{ secrets.AMERABOT_APP_PRIVATE_KEY }}
          owner: amera-apps

      - name: Sync dependabot config to repos
        id: sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs')
            const org = 'amera-apps'
            const branch = 'chore/sync-dependabot-config'
            const targetPath = '.github/dependabot.yml'
            const prTitle = 'chore: sync dependabot config from org template'

            // ── Skip list ────────────────────────────────────────────────────
            // Add repo names here to exclude them from syncing,
            // even if they have a pyproject.toml.
            const skipRepos = []

            const template = fs.readFileSync('.github/dependabot-python-template.yml', 'utf8')
            const templateB64 = Buffer.from(template).toString('base64')

            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org,
              type: 'all',
              per_page: 100
            })

            const opened = []
            const pending = []
            const skipped = []
            const upToDate = []
            const errors = []

            for (const repo of repos) {
              const name = repo.name
              if (repo.archived || name === '.github') continue
              if (skipRepos.includes(name)) {
                skipped.push(name)
                continue
              }

              try {
                // Check for pyproject.toml
                let pyproject
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner: org,
                    repo: name,
                    path: 'pyproject.toml'
                  })
                  pyproject = Buffer.from(data.content, 'base64').toString('utf8')
                } catch {
                  continue
                }

                // Check existing dependabot.yml
                let existingContent = null
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner: org,
                    repo: name,
                    path: targetPath
                  })
                  existingContent = Buffer.from(data.content, 'base64').toString('utf8')
                } catch {
                  // File doesn't exist yet
                }

                if (existingContent === template) {
                  upToDate.push(name)
                  continue
                }

                // Check for an existing open PR from a previous run
                const { data: existingPRs } = await github.rest.pulls.list({
                  owner: org,
                  repo: name,
                  head: `${org}:${branch}`,
                  state: 'open'
                })

                if (existingPRs.length > 0) {
                  const pr = existingPRs[0]
                  const openedDate = new Date(pr.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                  pending.push({ name, url: pr.html_url, openedDate })
                  core.info(`${name}: open sync PR already exists — ${pr.html_url}`)
                  continue
                }

                // Get default branch SHA to branch from
                const { data: refData } = await github.rest.git.getRef({
                  owner: org,
                  repo: name,
                  ref: `heads/${repo.default_branch}`
                })

                // Create or update the sync branch
                try {
                  await github.rest.git.updateRef({
                    owner: org,
                    repo: name,
                    ref: `heads/${branch}`,
                    sha: refData.object.sha,
                    force: true
                  })
                } catch {
                  await github.rest.git.createRef({
                    owner: org,
                    repo: name,
                    ref: `refs/heads/${branch}`,
                    sha: refData.object.sha
                  })
                }

                // Get existing file SHA on the branch (needed for update)
                let fileSha = null
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner: org,
                    repo: name,
                    path: targetPath,
                    ref: branch
                  })
                  fileSha = data.sha
                } catch {
                  // File doesn't exist on this branch yet
                }

                await github.rest.repos.createOrUpdateFileContents({
                  owner: org,
                  repo: name,
                  path: targetPath,
                  message: prTitle,
                  content: templateB64,
                  branch,
                  ...(fileSha && { sha: fileSha })
                })

                const { data: pr } = await github.rest.pulls.create({
                  owner: org,
                  repo: name,
                  title: prTitle,
                  body: 'Synced from the org-level [`dependabot-python-template.yml`](https://github.com/amera-apps/.github/blob/main/.github/dependabot-python-template.yml).\n\nThis configures Dependabot with CodeArtifact registry credentials and enables weekly updates for pip, Docker, and GitHub Actions ecosystems.',
                  head: branch,
                  base: repo.default_branch
                })

                opened.push({ name, url: pr.html_url })
                core.info(`${name}: opened PR — ${pr.html_url}`)
              } catch (err) {
                errors.push({ name, error: err.message })
                core.warning(`${name}: ${err.message}`)
              }
            }

            const summary = { opened, pending, skipped, upToDate, errors }
            core.setOutput('summary', JSON.stringify(summary))
            core.setOutput('opened_count', opened.length)

            // ── Build Slack message ────────────────────────────────────────
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const lines = []

            if (opened.length > 0) {
              const s = opened.length === 1 ? '' : 's'
              const verb = opened.length === 1 ? 'its' : 'their'
              lines.push(`I just reviewed all our Python repos and opened ${opened.length} new PR${s} to sync ${verb} dependabot config with the org template.`)
              lines.push('')
              lines.push('*Newly opened:*')
              for (const o of opened) lines.push(`• <${o.url}|${o.name}>`)
            }

            if (pending.length > 0) {
              if (opened.length > 0) {
                lines.push('')
                lines.push('*Still awaiting merge:*')
              } else {
                lines.push('I just reviewed all our Python repos — everything is in sync, but some PRs from previous runs are still awaiting merge:')
                lines.push('')
              }
              for (const p of pending) lines.push(`• <${p.url}|${p.name}> (opened ${p.openedDate})`)
            }

            if (lines.length > 0) {
              lines.push('')
              lines.push(`<${runUrl}|View workflow run>`)
            }

            core.setOutput('slack_text', lines.join('\n'))
            core.setOutput('should_post_slack', lines.length > 0)

            core.info(`Done. Opened: ${opened.length}, Pending: ${pending.length}, Up-to-date: ${upToDate.length}, Skipped: ${skipped.length}, Errors: ${errors.length}`)

      - name: Post Slack summary
        if: >-
          always()
          && steps.sync.outputs.should_post_slack == 'true'
          && (vars.SLACK_DEPENDABOT_ALERTS_CHANNEL_ID != '')
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_DEPENDABOT_ALERTS_CHANNEL_ID }}
            text: ${{ toJSON(steps.sync.outputs.slack_text) }}

      - name: Create Linear tickets
        if: >-
          always()
          && fromJSON(steps.sync.outputs.opened_count) > 0
          && (vars.LINEAR_AMERA_TEAM_ID != '')
        run: |
          SUMMARY='${{ steps.sync.outputs.summary }}'

          # One ticket per repo, landed in Triage for assignment
          echo "$SUMMARY" | jq -c '.opened[]' | while read -r item; do
            REPO=$(echo "$item" | jq -r '.name')
            PR_URL=$(echo "$item" | jq -r '.url')

            DESC=$(printf "The daily [dependabot config sync](https://github.com/amera-apps/.github/blob/main/.github/workflows/sync_dependabot_python.yml) workflow detected that **%s**'s \`.github/dependabot.yml\` was either missing or out of date with the [org template](https://github.com/amera-apps/.github/blob/main/.github/dependabot-python-template.yml), and opened a PR to bring it in line.\n\n**PR:** %s\n\n### What to do\n1. Review the PR and confirm the dependabot config looks correct for this repo\n2. Merge when ready\n3. If this repo needs a custom config or should be excluded from syncing, let @naurasj know" "$REPO" "$PR_URL")

            curl -s -X POST https://api.linear.app/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: $LINEAR_API_KEY" \
              -d "$(jq -n \
                --arg title "Dependabot config sync — review PR for $REPO" \
                --arg desc "$DESC" \
                --arg team "$LINEAR_TEAM_ID" \
                --arg project "$LINEAR_PROJECT_ID" \
                --arg state "$LINEAR_TRIAGE_STATE_ID" \
                '{ query: "mutation($input: IssueCreateInput!) { issueCreate(input: $input) { success issue { url } } }", variables: { input: { title: $title, description: $desc, teamId: $team, projectId: $project, stateId: $state } } }'
              )"
          done
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ vars.LINEAR_AMERA_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ vars.LINEAR_DEPENDABOT_ALERTS_PROJECT_ID }}
          LINEAR_TRIAGE_STATE_ID: ${{ vars.LINEAR_TRIAGE_STATE_ID }}
